- hosts: cockpit
  gather_facts: true
  become: true
  tasks:
    - name: Installing the Apache webserver
      block:
        - name: updating and installing apache server
          apt:  
            update_cache: true
            name: 
              - apache2
              - memcached
            state: present  
        - name: copying a new file to the apache server webpage
          template:
            content: | 
              <html>
                <body>
                  <h1>Hi, World</h1>
                  <h2>The os name is {{ ansible_board_name }}</h2>
                </body>
              </html>
            dest: /usr/html/www/index.html
            notify: 
              - restart apache
        - name: creating a service for apache server
          service:
            name: apache.service
            state: started
            enabled: true
